site_name: "edf / edf-omp Documentation"
site_description: "Electron Number Distribution Functions — user manual"
site_author: "E. Francisco & A. Martín Pendás"
docs_dir: docs
site_url: https://qtcovi.github.io/edf-omp/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - Input Reference:
    - Input Format: input-format.md
    - AOM Formats: aom-formats.md
    - Keywords:
      - Overview: keywords/index.md
      - Basic Control: keywords/basic.md
      - Wavefunction: keywords/wavefunction.md
      - Localization: keywords/localization.md
      - Analysis: keywords/analysis.md
      - Integration: keywords/integration.md
      - Output Control: keywords/output-control.md
  - Performance (edf-omp): performance.md
  - Output Guide: output-guide.md
  - Examples:
    - Overview: examples/index.md
    - H6 ring (RHF): examples/h6.md
    - N5+ cation (RHF): examples/n5plus.md
    - CH4 (CASSCF): examples/cas-ch4.md
    - N2H2 (CASSCF): examples/cas-n2h2.md
    - N2 CASSCF + rhfmode: examples/n2casb.md
  - Theory: theory.md
  - FAQ: faq.md
